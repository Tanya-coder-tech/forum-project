version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    container_name: forum-backend
    networks:
      - forum-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    container_name: forum-frontend
    depends_on:
      - backend
    networks:
      - forum-network

networks:
  forum-network:
    driver: bridge

